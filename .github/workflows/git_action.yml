name: Stock Data Cronjob

on:
  schedule:
    - cron: "*/5 3-10 * * 1-5"  # every 5 min, 08:30-16:00 IST (03:00-10:30 UTC) Mon-Fri
    - cron: "30 3 * * 1-5"       # 09:00 IST — pre-market
    - cron: "0 10 * * 1-5"       # 15:30 IST — market close
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          TV_USERNAME: ${{ secrets.TV_USERNAME }}
          TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
        run: python -m src.main

      - name: Commit changes
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/market_data.db data/option_chain.db || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push origin main
          else
            echo "Nothing to commit"
          fi
